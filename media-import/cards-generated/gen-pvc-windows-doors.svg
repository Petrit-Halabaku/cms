  </defs>
  <rect width="1280" height="960" fill="url(#bg)"/>
  <g stroke="#8dd7f7" stroke-opacity="0.055" stroke-width="1"><line x1="64" y1="0" x2="64" y2="960"/><line x1="128" y1="0" x2="128" y2="960"/><line x1="192" y1="0" x2="192" y2="960"/><line x1="256" y1="0" x2="256" y2="960"/><line x1="320" y1="0" x2="320" y2="960"/><line x1="384" y1="0" x2="384" y2="960"/><line x1="448" y1="0" x2="448" y2="960"/><line x1="512" y1="0" x2="512" y2="960"/><line x1="576" y1="0" x2="576" y2="960"/><line x1="640" y1="0" x2="640" y2="960"/><line x1="704" y1="0" x2="704" y2="960"/><line x1="768" y1="0" x2="768" y2="960"/><line x1="832" y1="0" x2="832" y2="960"/><line x1="896" y1="0" x2="896" y2="960"/><line x1="960" y1="0" x2="960" y2="960"/><line x1="1024" y1="0" x2="1024" y2="960"/><line x1="1088" y1="0" x2="1088" y2="960"/><line x1="1152" y1="0" x2="1152" y2="960"/><line x1="1216" y1="0" x2="1216" y2="960"/><line x1="0" y1="64" x2="1280" y2="64"/><line x1="0" y1="128" x2="1280" y2="128"/><line x1="0" y1="192" x2="1280" y2="192"/><line x1="0" y1="256" x2="1280" y2="256"/><line x1="0" y1="320" x2="1280" y2="320"/><line x1="0" y1="384" x2="1280" y2="384"/><line x1="0" y1="448" x2="1280" y2="448"/><line x1="0" y1="512" x2="1280" y2="512"/><line x1="0" y1="576" x2="1280" y2="576"/><line x1="0" y1="640" x2="1280" y2="640"/><line x1="0" y1="704" x2="1280" y2="704"/><line x1="0" y1="768" x2="1280" y2="768"/><line x1="0" y1="832" x2="1280" y2="832"/><line x1="0" y1="896" x2="1280" y2="896"/></g>
  
  <!-- door hinted at the right edge (cropped) -->
  <g stroke="#aecbff" stroke-opacity="0.35" fill="none" stroke-width="6">
    <rect x="1080" y="200" width="260" height="720" rx="8"/>
    <rect x="1120" y="240" width="180" height="300" rx="4"/>
    <rect x="1120" y="580" width="180" height="300" rx="4"/>
  </g>
  <circle cx="1102" cy="560" r="9" fill="#aecbff" fill-opacity="0.5"/>
