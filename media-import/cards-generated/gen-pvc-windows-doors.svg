  <rect x="330" y="130" width="620" height="620" rx="6" fill="none" stroke="#eef3ff" stroke-width="16"/>
  <rect x="366" y="166" width="548" height="548" rx="3" fill="#8dd7f7" fill-opacity="0.07" stroke="#cfe0ff" stroke-opacity="0.7" stroke-width="5"/>
