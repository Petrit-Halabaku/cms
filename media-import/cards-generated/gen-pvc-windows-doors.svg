<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="960" viewBox="0 0 1280 960">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#012653"/>
      <stop offset="1" stop-color="#01173a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8dd7f7" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#8dd7f7" stop-opacity="0"/>
