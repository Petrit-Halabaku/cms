  <rect width="1920" height="1280" fill="url(#bg)"/>
  <g stroke="#8dd7f7" stroke-opacity="0.05" stroke-width="1"><line x1="80" y1="0" x2="80" y2="1280"/><line x1="160" y1="0" x2="160" y2="1280"/><line x1="240" y1="0" x2="240" y2="1280"/><line x1="320" y1="0" x2="320" y2="1280"/><line x1="400" y1="0" x2="400" y2="1280"/><line x1="480" y1="0" x2="480" y2="1280"/><line x1="560" y1="0" x2="560" y2="1280"/><line x1="640" y1="0" x2="640" y2="1280"/><line x1="720" y1="0" x2="720" y2="1280"/><line x1="800" y1="0" x2="800" y2="1280"/><line x1="880" y1="0" x2="880" y2="1280"/><line x1="960" y1="0" x2="960" y2="1280"/><line x1="1040" y1="0" x2="1040" y2="1280"/><line x1="1120" y1="0" x2="1120" y2="1280"/><line x1="1200" y1="0" x2="1200" y2="1280"/><line x1="1280" y1="0" x2="1280" y2="1280"/><line x1="1360" y1="0" x2="1360" y2="1280"/><line x1="1440" y1="0" x2="1440" y2="1280"/><line x1="1520" y1="0" x2="1520" y2="1280"/><line x1="1600" y1="0" x2="1600" y2="1280"/><line x1="1680" y1="0" x2="1680" y2="1280"/><line x1="1760" y1="0" x2="1760" y2="1280"/><line x1="1840" y1="0" x2="1840" y2="1280"/><line x1="0" y1="80" x2="1920" y2="80"/><line x1="0" y1="160" x2="1920" y2="160"/><line x1="0" y1="240" x2="1920" y2="240"/><line x1="0" y1="320" x2="1920" y2="320"/><line x1="0" y1="400" x2="1920" y2="400"/><line x1="0" y1="480" x2="1920" y2="480"/><line x1="0" y1="560" x2="1920" y2="560"/><line x1="0" y1="640" x2="1920" y2="640"/><line x1="0" y1="720" x2="1920" y2="720"/><line x1="0" y1="800" x2="1920" y2="800"/><line x1="0" y1="880" x2="1920" y2="880"/><line x1="0" y1="960" x2="1920" y2="960"/><line x1="0" y1="1040" x2="1920" y2="1040"/><line x1="0" y1="1120" x2="1920" y2="1120"/><line x1="0" y1="1200" x2="1920" y2="1200"/></g>
  
